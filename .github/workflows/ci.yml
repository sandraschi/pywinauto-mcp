name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint with ruff
      run: |
        ruff check src/ tests/ --output-format=github

    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml -m "not e2e"

    - name: Check imports
      run: |
        python -c "from pywinauto_mcp.app import app; print('Import successful')"

  test-web:
    runs-on: windows-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: web_sota/package-lock.json

    - name: Install frontend dependencies
      working-directory: web_sota
      run: npm ci

    - name: Biome CI
      working-directory: web_sota
      run: npm run biome:ci

    - name: Production build
      working-directory: web_sota
      run: npm run build

    - name: Vitest
      working-directory: web_sota
      run: npm run test

  test-e2e:
    runs-on: windows-latest
    needs: test-web

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python package
      run: pip install -e .

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: web_sota/package-lock.json

    - name: Install frontend dependencies
      working-directory: web_sota
      run: npm ci

    - name: Build frontend
      working-directory: web_sota
      run: npm run build

    - name: Install Playwright Chromium
      working-directory: web_sota
      run: npm run test:e2e:install

    - name: Playwright e2e
      working-directory: web_sota
      run: npm run test:e2e

  build-mcpb:
    runs-on: windows-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install MCPB CLI
      run: npm install -g @anthropic-ai/mcpb

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e "."

    - name: Validate manifest
      run: mcpb validate manifest.json

    - name: Build MCPB package
      run: mcpb pack

    - name: Upload MCPB artifact
      uses: actions/upload-artifact@v4
      with:
        name: pywinauto-mcp-${{ github.sha }}
        path: dist/*.mcpb
        retention-days: 30

  build-tauri:
    runs-on: windows-latest
    needs: [test-web, test-e2e]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install Python package + desktop extras
      run: |
        uv sync --extra desktop
        uv pip install -e .

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: web_sota/package-lock.json

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install frontend dependencies
      working-directory: web_sota
      run: npm ci

    - name: Generate Tauri icons
      run: uv run python scripts/generate-tauri-icons.py

    - name: Build sidecar + Tauri installer
      working-directory: web_sota
      run: npm run tauri:build

    - name: Upload desktop installer
      uses: actions/upload-artifact@v4
      with:
        name: pywinauto-mcp-desktop-${{ github.sha }}
        path: |
          web_sota/src-tauri/target/release/bundle/**/*.msi
          web_sota/src-tauri/target/release/bundle/**/*.exe
        retention-days: 14
